# Observability: set OTLP_ENDPOINT in .env to enable distributed tracing.
# e.g.  OTLP_ENDPOINT=http://localhost:4317  (gRPC, OTel Collector or Jaeger)
# Tracing is disabled when the variable is empty or unset.

server:
  host: 0.0.0.0
  port: 8080
admin:
  username: admin
  password: admin123
database:
  pg_url: ""
  retention_days: 90
jwt_secret: ${GATEWAY_JWT_SECRET}
encryption_key: ${GATEWAY_ENCRYPTION_KEY}
previous_encryption_key: ${GATEWAY_PREVIOUS_ENCRYPTION_KEY}

# Cache / Redis
cache:
  enabled: true
  redis_url: "redis://:${REDIS_PASSWORD}@127.0.0.1:16379"

# SSO / 统一身份认证 (OIDC)
sso:
  enabled: false
  provider_name: SSO
  issuer_url: https://your-idp.example.com
  client_id: your-client-id
  client_secret: your-client-secret
  redirect_url: http://localhost:8080/admin/api/sso/callback
