services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-gateway-psql
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-aigateway}
    volumes:
      - psql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-aigateway}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  psql-data:
