services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-gateway
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    volumes:
      - ./config:/app/config:ro
      - gateway-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - GATEWAY_CONFIG=/app/config/config.yaml
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    restart: unless-stopped
    network_mode: host
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  gateway-data:
  redis-data:
