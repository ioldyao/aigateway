services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-gateway
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    volumes:
      - ./config:/app/config:ro
      - gateway-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - GATEWAY_CONFIG=/app/config/config.yaml

volumes:
  gateway-data:
