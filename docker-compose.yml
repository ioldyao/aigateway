services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-gateway
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    volumes:
      - ./config:/app/config:ro
      - gateway-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - GATEWAY_CONFIG=/app/config/config.yaml
      - GATEWAY_JWT_SECRET=${GATEWAY_JWT_SECRET}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-}
    depends_on:
      redis:
        condition: service_healthy

  # ── Observability ────────────────────────────────────────────
  jaeger:
    image: jaegertracing/jaeger:2.20
    container_name: ai-gateway-jaeger
    restart: unless-stopped
    network_mode: host
    command:
      - --span-storage.type=memory
      - --grpc.host-port=0.0.0.0:4317
      - --http.host-port=0.0.0.0:16686
    ports:
      - "16686:16686"   # Jaeger UI  → http://localhost:16686
      - "4317:4317"     # OTLP gRPC

  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    restart: unless-stopped
    network_mode: host
    command: ["redis-server", "--port", "16379", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "16379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  gateway-data:
  redis-data:
